<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Checklist CDE</title>
<style>
:root{--blue:#002b5c;--blue2:#0057b8;--bg:#f3f6fb;--card:#fff;--line:#e5e7eb;--text:#1f2937;--muted:#64748b;--green:#16a34a;--red:#dc2626;--orange:#f59e0b}
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;margin:0;background:var(--bg);color:var(--text)}
header{background:var(--blue);color:white;padding:16px 18px;position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center}
header h1{margin:0;font-size:24px}.header-actions{display:flex;gap:10px;flex-wrap:wrap}
.container{padding:20px;max-width:1200px;margin:auto}
.card,.section,.footer{background:var(--card);border-radius:14px;padding:18px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.stat{background:white;border-radius:14px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.stat small{color:var(--muted)}.stat strong{display:block;font-size:34px;color:var(--blue);margin-top:8px}
.section h2,.card h2,.footer h2{color:#003b82;margin-top:0}
.item{display:flex;flex-direction:column;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.row{display:flex;align-items:center;gap:10px}input[type="checkbox"]{width:20px;height:20px}label{font-weight:600}
textarea,input[type="text"]{margin-top:8px;padding:10px;border-radius:8px;border:1px solid #cbd5e1;font-size:14px;width:100%;background:white}
button{background:var(--blue2);color:white;border:none;padding:12px 16px;border-radius:10px;font-size:15px;cursor:pointer}
button:hover{background:#00418a}button.secondary{background:#e2e8f0;color:#0f172a}button.danger{background:var(--red)}button.green{background:var(--green)}button.orange{background:var(--orange)}
.table{width:100%;border-collapse:collapse;background:white}.table th,.table td{text-align:left;border-bottom:1px solid var(--line);padding:12px}
.badge{display:inline-block;padding:5px 10px;border-radius:999px;font-size:13px;background:#dbeafe;color:#003b82}
.success{margin-top:15px;padding:12px;background:#dcfce7;border:1px solid #86efac;border-radius:10px;display:none}
.hidden{display:none}.bottomnav{position:sticky;bottom:0;background:var(--blue);padding:10px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}.bottomnav button{min-width:130px}
.progressbar{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progressbar div{height:100%;background:var(--blue2);width:0%}
.meta{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.photo-box{border:1px dashed #94a3b8;border-radius:12px;padding:14px;margin-top:12px;background:#f8fafc}.photo-grid{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.photo{position:relative;width:120px;height:90px;border-radius:10px;overflow:hidden;border:1px solid #cbd5e1;background:white}.photo img{width:100%;height:100%;object-fit:cover}.photo button{position:absolute;top:4px;right:4px;padding:4px 7px;font-size:12px;background:var(--red)}
.five-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.five-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.meta{grid-template-columns:1fr}.five-grid{grid-template-columns:1fr}}
@media(max-width:600px){header h1{font-size:20px}.header-actions{display:none}.grid{grid-template-columns:1fr}.container{padding:12px}.bottomnav button{min-width:auto;flex:1}}
@media print{header,.bottomnav,.no-print,button,input[type=file]{display:none!important}body{background:white}.container{max-width:none;padding:0}.section,.footer,.card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}.hidden{display:block!important}textarea,input[type=text]{border:1px solid #ccc}}
</style>
</head>
<body>
<header><h1>Checklist - CDE</h1><div class="header-actions"><button class="secondary" onclick="showDashboard()">Dashboard</button><button onclick="newChecklist()">Nieuwe checklist</button><button onclick="showFiveS()">5S Checklist</button></div></header>
<div class="container"><main id="dashboardView"></main><main id="checklistView" class="hidden"></main><main id="fiveSView" class="hidden"></main></div>
<nav class="bottomnav no-print"><button onclick="showDashboard()">Dashboard</button><button onclick="newChecklist()">Nieuwe checklist</button><button onclick="showFiveS()">5S Checklist</button><button class="green" onclick="saveChecklist()">Opslaan</button><button class="orange" onclick="savePdf()">Opslaan als PDF</button></nav>
<script>
const checklistTemplate=[
{title:"Productie & Planning",items:["Status productie (gelopen / achterstand / voor op schema)","Aantal m² gecoat t.o.v. planning","Lopende orders (kritisch / prioriteit)","Orders niet gehaald + reden","Planning volgende ploeg (focuspunten)"]},
{title:"Kwaliteit",items:["Afkeur / afwijkingen","Klantmeldingen / interne meldingen","Aandachtspunten (laagdikte, dekking, zinkfouten)","Uitgevoerde controles (visueel / metingen)"]},
{title:"Storingen & Techniek",items:["Storingen geweest (omschrijving)","Tijd stilstand","Oorzaak bekend","Actie ondernomen / TD ingeschakeld","Lopende technische issues"]},
{title:"Veiligheid & Incidenten",items:["Incidenten / bijna-ongevallen","Onveilige situaties","Acties genomen","PBM-gebruik in orde"]},
{title:"Personeel",items:["Bezetting compleet","Ziekmeldingen / bijzonderheden","Inzet uitzendkrachten","Functioneren / bijzonder gedrag","Overuren / bijzonderheden"]},
{title:"Logistiek / Expeditie",items:["Aanvoer materiaal","Afvoer gereed product","Transport bijzonderheden","Problemen ophangen / afhalen"]},
{title:"Installatie & Proces",items:["Instellingen lijn","Oven / voorbehandeling","Poederverbruik / wissels","Schoonmaak uitgevoerd","Spuiters opmerking (poeders/storing)"]},
{title:"Actiepunten volgende ploeg",items:["Sleutel spuitbussenkast","Over te nemen taken","Aandachtspunten / risico’s","Deadlines / spoedorders"]}
];
const fiveSTemplate=["Sorteren: overbodige materialen verwijderd","Sorteren: werkplek vrij van rommel","Schikken: gereedschap ligt op vaste plek","Schikken: looppaden en werkzones vrij","Schoonmaken: vloer/werkplek schoon","Schoonmaken: machine/lijn schoon achtergelaten","Standaardiseren: labels/markeringen aanwezig","Standaardiseren: afvalbakken correct gebruikt","Standhouden: afwijkingen gemeld","Standhouden: 5S ronde uitgevoerd"];
let currentRecord=null;
function emptyRecord(){return{id:"CDE-"+new Date().toISOString().replaceAll(":","-").replaceAll(".","-"),createdAt:new Date().toLocaleString("nl-NL"),updatedAt:new Date().toLocaleString("nl-NL"),handoverLeader:"",receivingLeader:"",dateTime:new Date().toLocaleString("nl-NL"),photos:{"2":[],"6":[]},fiveS:fiveSTemplate.map((label,index)=>({index,label,checked:false})),items:checklistTemplate.flatMap((section,sIndex)=>section.items.map((label,iIndex)=>({section:sIndex,index:iIndex,label,checked:false,comment:""})))}} 
function ensureRecordShape(record){if(!record.photos)record.photos={"2":[],"6":[]};if(!record.photos["2"])record.photos["2"]=[];if(!record.photos["6"])record.photos["6"]=[];if(!record.fiveS)record.fiveS=fiveSTemplate.map((label,index)=>({index,label,checked:false}));return record}
function getRecords(){return JSON.parse(localStorage.getItem("cde-checklist-records-v2")||"[]").map(ensureRecordShape)}
function setRecords(records){localStorage.setItem("cde-checklist-records-v2",JSON.stringify(records))}
function countTotal(r){return r.items.length}function countDone(r){return r.items.filter(i=>i.checked).length}function countComments(r){return r.items.filter(i=>i.comment&&i.comment.trim()).length}function countFiveS(r){return r.fiveS.filter(i=>i.checked).length}function countPhotos(r){return(r.photos["2"]?.length||0)+(r.photos["6"]?.length||0)}
function hideAll(){dashboardView.classList.add("hidden");checklistView.classList.add("hidden");fiveSView.classList.add("hidden")}
function showDashboard(){hideAll();dashboardView.classList.remove("hidden");const records=getRecords();const last=records[0];dashboardView.innerHTML=`<div class="grid"><div class="stat"><small>Opgeslagen overdrachten</small><strong>${records.length}</strong></div><div class="stat"><small>Laatste voortgang</small><strong>${last?Math.round(countDone(last)/countTotal(last)*100):0}%</strong></div><div class="stat"><small>Laatste 5S</small><strong>${last?countFiveS(last)+"/"+last.fiveS.length:"0/0"}</strong></div><div class="stat"><small>Foto's</small><strong>${last?countPhotos(last):0}</strong></div></div><div class="card"><h2>Dashboard</h2><p>Hier staan alle opgeslagen ploegoverdrachten. Je kunt ze openen, lezen, aanpassen en opslaan als PDF.</p><button onclick="newChecklist()">Nieuwe checklist starten</button></div><div class="card"><h2>Opgeslagen overdrachten</h2>${records.length===0?`<p>Nog geen opgeslagen checklists.</p>`:`<table class="table"><thead><tr><th>Datum / Tijd</th><th>Overdragend</th><th>Ontvangend</th><th>Checklist</th><th>5S</th><th>Foto's</th><th>Acties</th></tr></thead><tbody>${records.map(r=>`<tr><td>${r.dateTime||r.createdAt}</td><td>${r.handoverLeader||"-"}</td><td>${r.receivingLeader||"-"}</td><td><span class="badge">${countDone(r)} / ${countTotal(r)}</span></td><td><span class="badge">${countFiveS(r)} / ${r.fiveS.length}</span></td><td>${countPhotos(r)}</td><td><button onclick="openRecord('${r.id}')">Openen</button> <button class="danger" onclick="deleteRecord('${r.id}')">Verwijderen</button></td></tr>`).join("")}</tbody></table>`}</div>`}
function newChecklist(){currentRecord=emptyRecord();renderChecklist()}
function openRecord(id){currentRecord=ensureRecordShape(getRecords().find(r=>r.id===id));renderChecklist()}
function deleteRecord(id){if(!confirm("Weet je zeker dat je deze checklist wilt verwijderen?"))return;setRecords(getRecords().filter(r=>r.id!==id));showDashboard()}
function renderChecklist(){if(!currentRecord)currentRecord=emptyRecord();hideAll();checklistView.classList.remove("hidden");const done=countDone(currentRecord),total=countTotal(currentRecord),percent=Math.round(done/total*100);let html=`<div class="card no-print"><h2>Checklist voortgang</h2><p>${done} van ${total} punten afgevinkt (${percent}%).</p><div class="progressbar"><div style="width:${percent}%"></div></div><p><button onclick="showFiveS()">Naar 5S Checklist</button></p></div>`;checklistTemplate.forEach((section,sIndex)=>{html+=`<div class="section"><h2>${sIndex+1}. ${section.title}</h2>`;section.items.forEach((label,iIndex)=>{const item=currentRecord.items.find(x=>x.section===sIndex&&x.index===iIndex);html+=`<div class="item"><div class="row"><input type="checkbox" ${item.checked?"checked":""} onchange="updateChecked(${sIndex},${iIndex},this.checked)"><label>${label}</label></div><textarea placeholder="Opmerking toevoegen..." oninput="updateComment(${sIndex},${iIndex},this.value)">${escapeHtml(item.comment)}</textarea></div>`});if(sIndex===1||sIndex===5){html+=renderPhotoBox(sIndex+1)}html+=`</div>`});html+=renderFooter();checklistView.innerHTML=html}
function renderPhotoBox(sectionNumber){const photos=currentRecord.photos[String(sectionNumber)]||[];return `<div class="photo-box"><h3>Foto's bij punt ${sectionNumber}</h3><p class="no-print">Maak of upload foto's die bij dit onderdeel horen.</p><input class="no-print" type="file" accept="image/*" capture="environment" multiple onchange="addPhotos(${sectionNumber}, this.files)"><div class="photo-grid">${photos.map((src,idx)=>`<div class="photo"><img src="${src}"><button class="no-print" onclick="removePhoto(${sectionNumber},${idx})">x</button></div>`).join("")}</div></div>`}
function renderFooter(){return `<div class="footer"><h2>Ondertekening</h2><div class="meta"><div><label>Overdragende teamleider</label><input type="text" value="${escapeHtml(currentRecord.handoverLeader)}" oninput="currentRecord.handoverLeader=this.value"></div><div><label>Ontvangende teamleider</label><input type="text" value="${escapeHtml(currentRecord.receivingLeader)}" oninput="currentRecord.receivingLeader=this.value"></div><div><label>Datum / Tijd</label><input type="text" value="${escapeHtml(currentRecord.dateTime)}" oninput="currentRecord.dateTime=this.value"></div></div><div style="margin-top:20px;" class="no-print"><button class="green" onclick="saveChecklist()">Opslaan in app</button> <button onclick="showFiveS()">5S Checklist</button> <button class="orange" onclick="savePdf()">Opslaan als PDF</button> <button class="secondary" onclick="showDashboard()">Terug naar dashboard</button></div><div id="saved" class="success">Checklist opgeslagen in de app.</div></div>`}
function showFiveS(){if(!currentRecord)currentRecord=emptyRecord();hideAll();fiveSView.classList.remove("hidden");const done=countFiveS(currentRecord),total=currentRecord.fiveS.length;fiveSView.innerHTML=`<div class="card"><h2>5S Checklist</h2><p>${done} van ${total} punten afgevinkt.</p><div class="progressbar"><div style="width:${Math.round(done/total*100)}%"></div></div></div><div class="section"><h2>5S Controle</h2><div class="five-grid">${currentRecord.fiveS.map((item,idx)=>`<div class="five-item"><div class="row"><input type="checkbox" ${item.checked?"checked":""} onchange="updateFiveS(${idx},this.checked)"><label>${item.label}</label></div></div>`).join("")}</div></div><div class="footer no-print"><button class="green" onclick="saveChecklist()">Opslaan in app</button> <button onclick="renderChecklist()">Terug naar checklist</button> <button class="orange" onclick="savePdf()">Opslaan als PDF</button></div>`}
function renderPrintAll(){renderChecklist();const checklistHtml=checklistView.innerHTML;showFiveS();const fiveSHtml=fiveSView.innerHTML;dashboardView.classList.add("hidden");checklistView.classList.remove("hidden");fiveSView.classList.remove("hidden");checklistView.innerHTML=checklistHtml;fiveSView.innerHTML=fiveSHtml}
function updateChecked(section,index,value){currentRecord.items.find(x=>x.section===section&&x.index===index).checked=value}
function updateComment(section,index,value){currentRecord.items.find(x=>x.section===section&&x.index===index).comment=value}
function updateFiveS(index,value){currentRecord.fiveS[index].checked=value;showFiveS()}
function addPhotos(sectionNumber,files){const key=String(sectionNumber);if(!currentRecord.photos[key])currentRecord.photos[key]=[];Array.from(files).forEach(file=>{const reader=new FileReader();reader.onload=e=>{currentRecord.photos[key].push(e.target.result);renderChecklist()};reader.readAsDataURL(file)})}
function removePhoto(sectionNumber,index){currentRecord.photos[String(sectionNumber)].splice(index,1);renderChecklist()}
function saveChecklist(){if(!currentRecord){alert("Start eerst een nieuwe checklist.");return}saveChecklistWithoutLeaving();const saved=document.getElementById("saved");if(saved)saved.style.display="block";showDashboard()}
function saveChecklistWithoutLeaving(){currentRecord.updatedAt=new Date().toLocaleString("nl-NL");const records=getRecords();const existingIndex=records.findIndex(r=>r.id===currentRecord.id);if(existingIndex>=0){records[existingIndex]=currentRecord}else{records.unshift(currentRecord)}setRecords(records)}
function savePdf(){if(!currentRecord){alert("Start of open eerst een checklist.");return}saveChecklistWithoutLeaving();renderPrintAll();setTimeout(()=>window.print(),250)}
function escapeHtml(str){return String(str||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
showDashboard();
</script>
</body>
</html>
