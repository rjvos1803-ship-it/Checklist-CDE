<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><meta name="theme-color" content="#002b5c"/><link rel="manifest" href="./manifest.webmanifest"/><link rel="apple-touch-icon" href="./icon.svg"/><title>Checklist CDE</title><style>
:root{--b:#002b5c;--b2:#0057b8;--bg:#f3f6fb;--g:#16a34a;--r:#dc2626;--o:#f59e0b}*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;background:var(--bg);color:#1f2937;padding-bottom:78px}header{background:var(--b);color:#fff;padding:16px 18px;position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center}h1{font-size:24px;margin:0}.container{padding:20px;max-width:1200px;margin:auto}.card,.section,.footer{background:#fff;border-radius:14px;padding:18px;margin-bottom:18px;box-shadow:0 2px 8px #0001}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.stat{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 8px #0001}.stat small{color:#64748b}.stat strong{display:block;font-size:34px;color:var(--b);margin-top:8px}h2{color:#003b82;margin-top:0}.item{display:flex;flex-direction:column;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #e5e7eb}.row{display:flex;align-items:center;gap:10px}input[type=checkbox]{width:20px;height:20px}label{font-weight:600}textarea,input[type=text]{margin-top:8px;padding:10px;border-radius:8px;border:1px solid #cbd5e1;font-size:14px;width:100%;background:#fff}button{background:var(--b2);color:white;border:0;padding:12px 16px;border-radius:10px;font-size:15px;cursor:pointer;margin:2px}button.secondary{background:#e2e8f0;color:#0f172a}button.danger{background:var(--r)}button.green{background:var(--g)}button.orange{background:var(--o)}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;background:white;min-width:760px}.table th,.table td{text-align:left;border-bottom:1px solid #e5e7eb;padding:12px}.badge{display:inline-block;padding:5px 10px;border-radius:999px;font-size:13px;background:#dbeafe;color:#003b82}.notice{padding:12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;margin-bottom:14px}.error{padding:12px;background:#fee2e2;border:1px solid #fecaca;border-radius:10px;margin-bottom:14px}.hidden{display:none}.bottomnav{position:fixed;left:0;right:0;bottom:0;background:var(--b);padding:10px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;z-index:20}.bottomnav button{min-width:120px}.progressbar{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progressbar div{height:100%;background:var(--b2)}.meta{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.photo-box{border:1px dashed #94a3b8;border-radius:12px;padding:14px;margin-top:12px;background:#f8fafc}.photo-grid{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.photo{position:relative;width:120px;height:90px;border-radius:10px;overflow:hidden;border:1px solid #cbd5e1;background:white}.photo img{width:100%;height:100%;object-fit:cover}.photo button{position:absolute;top:4px;right:4px;padding:4px 7px;font-size:12px;background:var(--r)}.five-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.five-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px}@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.meta{grid-template-columns:1fr}.five-grid{grid-template-columns:1fr}}@media(max-width:600px){h1{font-size:20px}.grid{grid-template-columns:1fr}.container{padding:12px}.bottomnav button{min-width:auto;flex:1;font-size:13px;padding:10px 8px}.table{font-size:14px}}@media print{header,.bottomnav,.no-print,button,input[type=file]{display:none!important}body{background:white;padding-bottom:0}.container{max-width:none;padding:0}.section,.footer,.card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}.hidden{display:block!important}textarea,input[type=text]{border:1px solid #ccc}}
</style></head><body><header><h1>Checklist - CDE</h1><div><button class="secondary" onclick="showDashboard()">Dashboard</button><button onclick="newChecklist()">Nieuwe checklist</button><button onclick="showFiveS()">5S Checklist</button></div></header><div class="container"><main id="dashboardView"></main><main id="checklistView" class="hidden"></main><main id="fiveSView" class="hidden"></main></div><nav class="bottomnav no-print"><button onclick="showDashboard()">Dashboard</button><button onclick="newChecklist()">Nieuw</button><button onclick="showFiveS()">5S</button><button class="green" onclick="saveChecklist()">Opslaan</button><button class="orange" onclick="savePdf()">PDF</button></nav><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>
const client=supabase.createClient('https://zuvavqygpacbohxjeuzu.supabase.co','sb_publishable_xvdpTG3mGRQm718DeaUPJA_GyGHpX-e');
const tpl=[['Productie & Planning',['Status productie (gelopen / achterstand / voor op schema)','Aantal m² gecoat t.o.v. planning','Lopende orders (kritisch / prioriteit)','Orders niet gehaald + reden','Planning volgende ploeg (focuspunten)']],['Kwaliteit',['Afkeur / afwijkingen','Klantmeldingen / interne meldingen','Aandachtspunten (laagdikte, dekking, zinkfouten)','Uitgevoerde controles (visueel / metingen)']],['Storingen & Techniek',['Storingen geweest (omschrijving)','Tijd stilstand','Oorzaak bekend','Actie ondernomen / TD ingeschakeld','Lopende technische issues']],['Veiligheid & Incidenten',['Incidenten / bijna-ongevallen','Onveilige situaties','Acties genomen','PBM-gebruik in orde']],['Personeel',['Bezetting compleet','Ziekmeldingen / bijzonderheden','Inzet uitzendkrachten','Functioneren / bijzonder gedrag','Overuren / bijzonderheden']],['Logistiek / Expeditie',['Aanvoer materiaal','Afvoer gereed product','Transport bijzonderheden','Problemen ophangen / afhalen']],['Installatie & Proces',['Instellingen lijn','Oven / voorbehandeling','Poederverbruik / wissels','Schoonmaak uitgevoerd','Spuiters opmerking (poeders/storing)']],['Actiepunten volgende ploeg',['Sleutel spuitbussenkast','Over te nemen taken','Aandachtspunten / risico’s','Deadlines / spoedorders']]];
const fiveSTemplate=['Sorteren: overbodige materialen verwijderd','Sorteren: werkplek vrij van rommel','Schikken: gereedschap ligt op vaste plek','Schikken: looppaden en werkzones vrij','Schoonmaken: vloer/werkplek schoon','Schoonmaken: machine/lijn schoon achtergelaten','Standaardiseren: labels/markeringen aanwezig','Standaardiseren: afvalbakken correct gebruikt','Standhouden: afwijkingen gemeld','Standhouden: 5S ronde uitgevoerd'];
let current=null, records=[]; const h=s=>String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
function empty(){return{id:null,dateTime:new Date().toLocaleString('nl-NL'),handoverLeader:'',receivingLeader:'',photos:{'2':[],'6':[]},fiveS:fiveSTemplate.map((label,index)=>({index,label,checked:false})),items:tpl.flatMap((s,si)=>s[1].map((label,ii)=>({section:si,index:ii,label,checked:false,comment:''})))}}
function shape(r){r.photos=r.photos||{'2':[],'6':[]};r.photos['2']=r.photos['2']||[];r.photos['6']=r.photos['6']||[];r.fiveS=r.fiveS||fiveSTemplate.map((label,index)=>({index,label,checked:false}));r.items=r.items||[];return r}
function rowToRec(row){return shape({id:row.id,createdAt:row.created_at?new Date(row.created_at).toLocaleString('nl-NL'):'',dateTime:row.datum_tijd||'',handoverLeader:row.overdragende_teamleider||'',receivingLeader:row.ontvangende_teamleider||'',items:row.checklist_data||[],fiveS:row.five_s_data||[],photos:row.photos||{'2':[],'6':[]}})}
function recToRow(r){return{datum_tijd:r.dateTime,overdragende_teamleider:r.handoverLeader,ontvangende_teamleider:r.receivingLeader,checklist_data:r.items,five_s_data:r.fiveS,photos:r.photos,status:'Opgeslagen'}}
async function load(){const {data,error}=await client.from('overdrachten').select('*').order('created_at',{ascending:false}); if(error) throw error; records=(data||[]).map(rowToRec); return records}
async function saveRec(r){const row=recToRow(r); if(r.id){const {data,error}=await client.from('overdrachten').update(row).eq('id',r.id).select().single(); if(error) throw error; current=rowToRec(data)} else {const {data,error}=await client.from('overdrachten').insert(row).select().single(); if(error) throw error; current=rowToRec(data)}}
const total=r=>r.items.length, done=r=>r.items.filter(i=>i.checked).length, five=r=>r.fiveS.filter(i=>i.checked).length, photos=r=>(r.photos['2']?.length||0)+(r.photos['6']?.length||0); function hideAll(){dashboardView.classList.add('hidden');checklistView.classList.add('hidden');fiveSView.classList.add('hidden')}
async function showDashboard(){hideAll();dashboardView.classList.remove('hidden');dashboardView.innerHTML='<div class="card"><h2>Dashboard laden...</h2></div>';try{let rs=await load(), last=rs[0];dashboardView.innerHTML=`<div class="notice no-print"><b>Online opslag actief:</b> pc, tablet en telefoon gebruiken dezelfde gegevens.</div><div class="grid"><div class="stat"><small>Overdrachten</small><strong>${rs.length}</strong></div><div class="stat"><small>Laatste voortgang</small><strong>${last?Math.round(done(last)/total(last)*100):0}%</strong></div><div class="stat"><small>Laatste 5S</small><strong>${last?five(last)+'/'+last.fiveS.length:'0/0'}</strong></div><div class="stat"><small>Foto&apos;s</small><strong>${last?photos(last):0}</strong></div></div><div class="card"><h2>Dashboard</h2><p>Hier staan alle online opgeslagen ploegoverdrachten.</p><button onclick="newChecklist()">Nieuwe checklist starten</button></div><div class="card"><h2>Opgeslagen overdrachten</h2>${rs.length?`<div class="table-wrap"><table class="table"><thead><tr><th>Datum / Tijd</th><th>Overdragend</th><th>Ontvangend</th><th>Checklist</th><th>5S</th><th>Foto's</th><th>Acties</th></tr></thead><tbody>${rs.map(r=>`<tr><td>${r.dateTime||r.createdAt}</td><td>${h(r.handoverLeader)||'-'}</td><td>${h(r.receivingLeader)||'-'}</td><td><span class="badge">${done(r)} / ${total(r)}</span></td><td><span class="badge">${five(r)} / ${r.fiveS.length}</span></td><td>${photos(r)}</td><td><button onclick="openRecord('${r.id}')">Openen</button> <button class="danger" onclick="delRecord('${r.id}')">Verwijderen</button></td></tr>`).join('')}</tbody></table></div>`:'<p>Nog geen opgeslagen checklists.</p>'}</div>`}catch(e){dashboardView.innerHTML=`<div class="error"><b>Kan gegevens niet laden.</b><br>${h(e.message)}<br><br>Controleer of supabase-setup.sql is uitgevoerd.</div>`}}
function newChecklist(){current=empty();renderChecklist()} function openRecord(id){current=shape(records.find(r=>r.id===id));renderChecklist()} async function delRecord(id){if(!confirm('Verwijderen?'))return; const {error}=await client.from('overdrachten').delete().eq('id',id); if(error)alert(error.message); else showDashboard()}
function renderChecklist(){current=current||empty();hideAll();checklistView.classList.remove('hidden');let p=Math.round(done(current)/total(current)*100), html=`<div class="card no-print"><h2>Checklist voortgang</h2><p>${done(current)} van ${total(current)} punten afgevinkt (${p}%).</p><div class="progressbar"><div style="width:${p}%"></div></div><p><button onclick="showFiveS()">Naar 5S Checklist</button></p></div>`;tpl.forEach((s,si)=>{html+=`<div class="section"><h2>${si+1}. ${s[0]}</h2>`;s[1].forEach((label,ii)=>{let item=current.items.find(x=>x.section===si&&x.index===ii);html+=`<div class="item"><div class="row"><input type="checkbox" ${item.checked?'checked':''} onchange="updateChecked(${si},${ii},this.checked)"><label>${label}</label></div><textarea placeholder="Opmerking toevoegen..." oninput="updateComment(${si},${ii},this.value)">${h(item.comment)}</textarea></div>`}); if(si===1||si===5)html+=photoBox(si+1); html+='</div>'}); html+=footer(); checklistView.innerHTML=html}
function photoBox(n){let ps=current.photos[String(n)]||[];return `<div class="photo-box"><h3>Foto's bij punt ${n}</h3><p class="no-print">Maak of upload foto's.</p><input class="no-print" type="file" accept="image/*" capture="environment" multiple onchange="addPhotos(${n},this.files)"><div class="photo-grid">${ps.map((src,i)=>`<div class="photo"><img src="${src}"><button class="no-print" onclick="removePhoto(${n},${i})">x</button></div>`).join('')}</div></div>`}
function footer(){return `<div class="footer"><h2>Ondertekening</h2><div class="meta"><div><label>Overdragende teamleider</label><input type="text" value="${h(current.handoverLeader)}" oninput="current.handoverLeader=this.value"></div><div><label>Ontvangende teamleider</label><input type="text" value="${h(current.receivingLeader)}" oninput="current.receivingLeader=this.value"></div><div><label>Datum / Tijd</label><input type="text" value="${h(current.dateTime)}" oninput="current.dateTime=this.value"></div></div><div class="no-print" style="margin-top:20px"><button class="green" onclick="saveChecklist()">Online opslaan</button><button onclick="showFiveS()">5S Checklist</button><button class="orange" onclick="savePdf()">Opslaan als PDF</button><button class="secondary" onclick="showDashboard()">Terug</button></div></div>`}
function showFiveS(){current=current||empty();hideAll();fiveSView.classList.remove('hidden');fiveSView.innerHTML=`<div class="card"><h2>5S Checklist</h2><p>${five(current)} van ${current.fiveS.length} punten afgevinkt.</p></div><div class="section"><h2>5S Controle</h2><div class="five-grid">${current.fiveS.map((item,i)=>`<div class="five-item"><div class="row"><input type="checkbox" ${item.checked?'checked':''} onchange="updateFiveS(${i},this.checked)"><label>${item.label}</label></div></div>`).join('')}</div></div><div class="footer no-print"><button class="green" onclick="saveChecklist()">Online opslaan</button><button onclick="renderChecklist()">Terug</button><button class="orange" onclick="savePdf()">PDF</button></div>`}
function updateChecked(s,i,v){current.items.find(x=>x.section===s&&x.index===i).checked=v} function updateComment(s,i,v){current.items.find(x=>x.section===s&&x.index===i).comment=v} function updateFiveS(i,v){current.fiveS[i].checked=v;showFiveS()} function addPhotos(n,files){let k=String(n);Array.from(files).forEach(f=>{let r=new FileReader();r.onload=e=>{current.photos[k].push(e.target.result);renderChecklist()};r.readAsDataURL(f)})} function removePhoto(n,i){current.photos[String(n)].splice(i,1);renderChecklist()}
async function saveChecklist(){try{await saveRec(current);alert('Online opgeslagen.');showDashboard()}catch(e){alert('Opslaan mislukt: '+e.message)}} async function savePdf(){try{await saveRec(current)}catch(e){alert('Opslaan mislukt, PDF wordt wel geopend: '+e.message)}renderChecklist();let c=checklistView.innerHTML;showFiveS();let f=fiveSView.innerHTML;checklistView.classList.remove('hidden');fiveSView.classList.remove('hidden');checklistView.innerHTML=c;fiveSView.innerHTML=f;setTimeout(()=>window.print(),250)} if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));showDashboard();
</script></body></html>
