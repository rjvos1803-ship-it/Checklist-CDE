function esc(s){return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')} function hide(){dash.classList.add('hidden');over.classList.add('hidden');five.classList.add('hidden');inb.classList.add('hidden')}function dnl(){return new Date().toLocaleString('nl-NL')}function parseD(s){let m=String(s||'').match(/(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);if(m)return new Date(+m[3],+m[2]-1,+m[1]);let d=new Date(s);return isNaN(d)?null:d}function iso(r){let d=parseD(r.dateTime);return d?d.toISOString().slice(0,10):''}function wk(d){d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));let n=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-n);let y=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-y)/86400000)+1)/7)}function wkr(r){let d=parseD(r.dateTime);return d?wk(d):''}function cphotos(p){return Object.values(p||{}).reduce((a,b)=>a+(b?.length||0),0)}function openPhoto(s){modalImg.src=s;modal.style.display='flex'}function closePhoto(){modal.style.display='none';modalImg.src=''}

function photoBox(obj,key,add,rem){return `<div class=photoBox><h3>Foto's</h3><label class=btn>Foto maken<input style="display:none" type=file accept="image/*" capture="environment" multiple onchange="${add}"></label> <label class="btn sec">Foto uit album kiezen<input style="display:none" type=file accept="image/*" multiple onchange="${add}"></label><div class=photos>${(obj[key]||[]).map((p,i)=>`<div class=photo><img src="${p}" onclick="openPhoto('${p}')"><button onclick="${rem}${i})">x</button></div>`).join('')}</div></div>`}function addTo(obj,key,files,cb){if(!obj[key])obj[key]=[];Array.from(files).forEach(f=>{let r=new FileReader();r.onload=e=>{obj[key].push(e.target.result);cb()};r.readAsDataURL(f)})}function addOPhotos(k,f){addTo(curO.photos,String(k),f,renderOver)}function remOPhoto(k,i){curO.photos[String(k)].splice(i,1);renderOver()}

async function saveOver(){try{let row={datum_tijd:curO.dateTime,overdragende_teamleider:curO.handoverLeader,ontvangende_teamleider:curO.receivingLeader,checklist_data:curO.items,five_s_data:curO.fiveS,photos:curO.photos,status:'Opgeslagen'},res=curO.id?await supabaseClient.from('overdrachten').update(row).eq('id',curO.id).select().single():await supabaseClient.from('overdrachten').insert(row).select().single();if(res.error)throw res.error;curO.id=res.data.id;alert('Overdracht opgeslagen');await load()}catch(e){alert('Opslaan mislukt: '+e.message)}}async function saveIn(){if(!curI.orderNumber.trim())return alert('Ordernummer is verplicht');try{let row={datum_tijd:curI.dateTime,ordernummer:curI.orderNumber,controleur:curI.controller,checklist_data:curI.items,photos:curI.photos,status:'Opgeslagen'},res=curI.id?await supabaseClient.from('ingangscontroles').update(row).eq('id',curI.id).select().single():await supabaseClient.from('ingangscontroles').insert(row).select().single();if(res.error)throw res.error;curI.id=res.data.id;alert('Ingangscontrole opgeslagen');await load()}catch(e){alert('Opslaan mislukt: '+e.message)}}async function delOver(id){if(confirm('Verwijderen?')){await supabaseClient.from('overdrachten').delete().eq('id',id);showDash()}}async function delIn(id){if(confirm('Verwijderen?')){await supabaseClient.from('ingangscontroles').delete().eq('id',id);showDash()}}function saveCurrent(){mode==='in'?saveIn():curO?saveOver():alert('Open eerst een checklist')}function pdfCurrent(){mode==='in'?pdfIn():curO?pdfOver():alert('Open eerst een checklist')}function pdfOverId(id){curO=overs.find(x=>x.id===id);pdfOver()}function pdfInId(id){curI=ins.find(x=>x.id===id);pdfIn()}
function rep(title,body){let w=window.open('','_blank');if(!w)return alert('Sta pop-ups toe voor PDF');w.document.write(`<!doctype html><html><head><meta charset=utf-8><title>${title}</title><style>@page{size:A4;margin:14mm}body{font-family:Arial,sans-serif;font-size:12px;color:#111827}h1{color:#002b5c;border-bottom:4px solid #002b5c;padding-bottom:10px}h2{color:#002b5c;border-bottom:2px solid #dbeafe;padding-bottom:6px}.meta,.sum{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}.box,.sec{border:1px solid #cbd5e1;border-radius:8px;padding:10px;margin-bottom:12px;break-inside:avoid}.check{display:inline-flex;width:17px;height:17px;border:1.5px solid #002b5c;align-items:center;justify-content:center;font-weight:bold;margin-right:8px}.it{border-bottom:1px solid #e5e7eb;padding:7px 0}.com{margin:6px 0 0 26px;padding:8px;background:#f8fafc;border-left:3px solid #0057b8;white-space:pre-wrap}.ph{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.ph img{width:100%;max-height:230px;object-fit:contain;border:1px solid #cbd5e1;border-radius:8px}.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}</style></head><body>${body}</body></html>`);w.document.close();setTimeout(()=>{w.focus();w.print()},500)}function pdfOver(){if(!curO)return alert('Open eerst een overdracht');let done=curO.items.filter(i=>i.checked).length,body=`<h1>Ploegenoverdracht - CDE</h1><div class=meta><div class=box><b>Datum/tijd</b><br>${esc(curO.dateTime)}</div><div class=box><b>Overdragende teamleider</b><br>${esc(curO.handoverLeader||'-')}</div><div class=box><b>Ontvangende teamleider</b><br>${esc(curO.receivingLeader||'-')}</div></div><div class=sum><div class=box><b>Checklist</b><br>${done}/${curO.items.length}</div><div class=box><b>5S</b><br>${curO.fiveS.filter(x=>x.checked).length}/${curO.fiveS.length}</div><div class=box><b>Foto's</b><br>${cphotos(curO.photos)}</div></div>`;tpl.forEach((s,si)=>{body+=`<div class=sec><h2>${si+1}. ${esc(s[0])}</h2>`;s[1].forEach((lab,ii)=>{let it=curO.items.find(x=>x.section===si&&x.index===ii)||{};body+=`<div class=it><span class=check>${it.checked?'✓':''}</span><b>${esc(lab)}</b>${it.comment?`<div class=com>${esc(it.comment)}</div>`:''}</div>`});let ps=curO.photos[String(si+1)]||[];if(ps.length)body+=`<div class=ph>${ps.map(p=>`<img src="${p}">`).join('')}</div>`;body+='</div>'});body+=`<div class=sec><h2>5S Checklist</h2><div class=fg>${curO.fiveS.map(x=>`<div><span class=check>${x.checked?'✓':''}</span>${esc(x.label)}</div>`).join('')}</div></div>`;rep('Ploegenoverdracht_CDE',body)}function pdfIn(){if(!curI)return alert('Open eerst een ingangscontrole');if(!curI.orderNumber.trim())return alert('Ordernummer is verplicht');let body=`<h1>Ingangscontrole - CDE</h1><div class=meta><div class=box><b>Ordernummer</b><br>${esc(curI.orderNumber)}</div><div class=box><b>Controleur</b><br>${esc(curI.controller||'-')}</div><div class=box><b>Datum/tijd</b><br>${esc(curI.dateTime)}</div></div><div class=sec><h2>Checklist Ingangscontrole</h2>`;curI.items.forEach(it=>{body+=`<div class=it><span class=check>${it.checked?'✓':''}</span><b>${esc(it.label)}</b>${it.comment?`<div class=com>${esc(it.comment)}</div>`:''}</div>`});body+='</div>';let ps=curI.photos.damage||[];if(ps.length)body+=`<div class=sec><h2>Foto's kwaliteitscontrole</h2><div class=ph>${ps.map(p=>`<img src="${p}">`).join('')}</div></div>`;let wps=curI.photos.wholeorder||[];if(wps.length)body+=`<div class=sec><h2>Foto's gehele order</h2><div class=ph>${wps.map(p=>`<img src="${p}">`).join('')}</div></div>`;rep('Ingangscontrole_CDE_'+curI.orderNumber,body)}
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));showDash();
</script></body></html>
