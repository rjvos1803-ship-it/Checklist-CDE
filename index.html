<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#002b5c"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="./manifest.webmanifest"/>
<link rel="apple-touch-icon" href="./icon.svg"/>
<title>Checklist CDE</title>
<style>
:root{--blue:#002b5c;--blue2:#0057b8;--bg:#f3f6fb;--card:#fff;--line:#e5e7eb;--text:#1f2937;--muted:#64748b;--green:#16a34a;--red:#dc2626;--orange:#f59e0b}
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;margin:0;background:var(--bg);color:var(--text);padding-bottom:78px}
header{background:var(--blue);color:white;padding:16px 18px;position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center}
header h1{margin:0;font-size:24px}.header-actions{display:flex;gap:10px;flex-wrap:wrap}
.container{padding:20px;max-width:1250px;margin:auto}
.card,.section,.footer{background:var(--card);border-radius:14px;padding:18px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.filtergrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:end}
.stat{background:white;border-radius:14px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.stat small{color:var(--muted)}.stat strong{display:block;font-size:34px;color:var(--blue);margin-top:8px}
h2{color:#003b82;margin-top:0}
.item{display:flex;flex-direction:column;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.row{display:flex;align-items:center;gap:10px}input[type="checkbox"]{width:20px;height:20px}
label{font-weight:600}
textarea,input[type="text"],input[type="date"],input[type="number"]{margin-top:8px;padding:10px;border-radius:8px;border:1px solid #cbd5e1;font-size:14px;width:100%;background:white}
button{background:var(--blue2);color:white;border:none;padding:12px 16px;border-radius:10px;font-size:15px;cursor:pointer}
button.secondary{background:#e2e8f0;color:#0f172a}button.danger{background:var(--red)}button.green{background:var(--green)}button.orange{background:var(--orange)}
.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;background:white;min-width:900px}.table th,.table td{text-align:left;border-bottom:1px solid var(--line);padding:12px;vertical-align:top}
.badge{display:inline-block;padding:5px 10px;border-radius:999px;font-size:13px;background:#dbeafe;color:#003b82}
.notice{padding:12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;margin-bottom:14px}
.error{padding:12px;background:#fee2e2;border:1px solid #fecaca;border-radius:10px;margin-bottom:14px}
.success{margin-top:15px;padding:12px;background:#dcfce7;border:1px solid #86efac;border-radius:10px;display:none}
.hidden{display:none}
.bottomnav{position:fixed;left:0;right:0;bottom:0;background:var(--blue);padding:10px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap;z-index:20}
.progressbar{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progressbar div{height:100%;background:var(--blue2)}
.meta{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.photo-box{border:1px dashed #94a3b8;border-radius:12px;padding:14px;margin-top:12px;background:#f8fafc}
.photo-grid{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.photo{position:relative;width:120px;height:90px;border-radius:10px;overflow:hidden;border:1px solid #cbd5e1;background:white;cursor:pointer}
.photo img{width:100%;height:100%;object-fit:cover}.photo button{position:absolute;top:4px;right:4px;padding:4px 7px;font-size:12px;background:var(--red)}
.thumbrow{display:flex;gap:6px;flex-wrap:wrap}.thumb{width:52px;height:42px;border-radius:6px;object-fit:cover;border:1px solid #cbd5e1;cursor:pointer}
.five-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.five-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.86);z-index:99;display:none;align-items:center;justify-content:center;padding:18px}
.modal img{max-width:96vw;max-height:86vh;border-radius:12px;background:white}
.modal button{position:absolute;top:18px;right:18px;background:var(--red)}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.filtergrid,.meta{grid-template-columns:1fr 1fr}.five-grid{grid-template-columns:1fr}}
@media(max-width:600px){header h1{font-size:20px}.header-actions{display:none}.grid,.filtergrid,.meta{grid-template-columns:1fr}.container{padding:12px}.bottomnav button{flex:1;font-size:13px;padding:10px 8px}.table{font-size:14px}}
@media print{header,.bottomnav,.no-print,button,input[type=file],.modal{display:none!important}body{background:white;padding-bottom:0}.container{max-width:none;padding:0}.section,.footer,.card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}.hidden{display:block!important}textarea,input[type=text]{border:1px solid #ccc}.table{min-width:0}}
</style>
</head>
<body>
<header><h1>Checklist - CDE</h1><div class="header-actions"><button class="secondary" onclick="showDashboard()">Dashboard</button><button onclick="newChecklist()">Nieuwe checklist</button><button onclick="showFiveS()">5S Checklist</button></div></header>
<div class="container"><main id="dashboardView"></main><main id="checklistView" class="hidden"></main><main id="fiveSView" class="hidden"></main></div>
<nav class="bottomnav no-print"><button onclick="showDashboard()">Dashboard</button><button onclick="newChecklist()">Nieuw</button><button onclick="showFiveS()">5S</button><button class="green" onclick="saveChecklist()">Opslaan</button><button class="orange" onclick="savePdf()">PDF</button></nav>
<div id="photoModal" class="modal" onclick="closePhoto()"><button>Sluiten</button><img id="modalImg" src=""></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://zuvavqygpacbohxjeuzu.supabase.co";
const SUPABASE_KEY="sb_publishable_xvdpTG3mGRQm718DeaUPJA_GyGHpX-e";
const supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const checklistTemplate=[
{title:"Productie & Planning",items:["Status productie (gelopen / achterstand / voor op schema)","Aantal m² gecoat t.o.v. planning","Lopende orders (kritisch / prioriteit)","Orders niet gehaald + reden","Planning volgende ploeg (focuspunten)"]},
{title:"Kwaliteit",items:["Afkeur / afwijkingen","Klantmeldingen / interne meldingen","Aandachtspunten (laagdikte, dekking, zinkfouten)","Uitgevoerde controles (visueel / metingen)"]},
{title:"Storingen & Techniek",items:["Storingen geweest (omschrijving)","Tijd stilstand","Oorzaak bekend","Actie ondernomen / TD ingeschakeld","Lopende technische issues"]},
{title:"Veiligheid & Incidenten",items:["Incidenten / bijna-ongevallen","Onveilige situaties","Acties genomen","PBM-gebruik in orde"]},
{title:"Personeel",items:["Bezetting compleet","Ziekmeldingen / bijzonderheden","Inzet uitzendkrachten","Functioneren / bijzonder gedrag","Overuren / bijzonderheden"]},
{title:"Logistiek / Expeditie",items:["Aanvoer materiaal","Afvoer gereed product","Transport bijzonderheden","Problemen ophangen / afhalen"]},
{title:"Installatie & Proces",items:["Instellingen lijn","Oven / voorbehandeling","Poederverbruik / wissels","Schoonmaak uitgevoerd","Spuiters opmerking (poeders/storing)"]},
{title:"Actiepunten volgende ploeg",items:["Sleutel spuitbussenkast","Over te nemen taken","Aandachtspunten / risico’s","Deadlines / spoedorders"]}
];
const fiveSTemplate=["Sorteren: overbodige materialen verwijderd","Sorteren: werkplek vrij van rommel","Schikken: gereedschap ligt op vaste plek","Schikken: looppaden en werkzones vrij","Schoonmaken: vloer/werkplek schoon","Schoonmaken: machine/lijn schoon achtergelaten","Standaardiseren: labels/markeringen aanwezig","Standaardiseren: afvalbakken correct gebruikt","Standhouden: afwijkingen gemeld","Standhouden: 5S ronde uitgevoerd"];
let currentRecord=null,cachedRecords=[];

function emptyRecord(){return{id:null,createdAt:new Date().toLocaleString("nl-NL"),updatedAt:new Date().toLocaleString("nl-NL"),handoverLeader:"",receivingLeader:"",dateTime:new Date().toLocaleString("nl-NL"),photos:{"2":[],"6":[]},fiveS:fiveSTemplate.map((label,index)=>({index,label,checked:false})),items:checklistTemplate.flatMap((section,sIndex)=>section.items.map((label,iIndex)=>({section:sIndex,index:iIndex,label,checked:false,comment:""})))}}
function ensureRecordShape(record){if(!record.photos)record.photos={"2":[],"6":[]};if(!record.photos["2"])record.photos["2"]=[];if(!record.photos["6"])record.photos["6"]=[];if(!record.fiveS)record.fiveS=fiveSTemplate.map((label,index)=>({index,label,checked:false}));if(!record.items)record.items=[];return record}
function dbRowToRecord(row){return ensureRecordShape({id:row.id,createdAt:row.created_at?new Date(row.created_at).toLocaleString("nl-NL"):"",updatedAt:row.created_at?new Date(row.created_at).toLocaleString("nl-NL"):"",handoverLeader:row.overdragende_teamleider||"",receivingLeader:row.ontvangende_teamleider||"",dateTime:row.datum_tijd||"",items:row.checklist_data||[],fiveS:row.five_s_data||[],photos:row.photos||{"2":[],"6":[]}})}
function recordToDbRow(record){return{datum_tijd:record.dateTime,overdragende_teamleider:record.handoverLeader,ontvangende_teamleider:record.receivingLeader,checklist_data:record.items,five_s_data:record.fiveS,photos:record.photos,status:"Opgeslagen"}}
async function loadRecords(){const{data,error}=await supabaseClient.from("overdrachten").select("*").order("created_at",{ascending:false});if(error)throw error;cachedRecords=(data||[]).map(dbRowToRecord);return cachedRecords}
async function saveRecord(record){const row=recordToDbRow(record);if(record.id){const{data,error}=await supabaseClient.from("overdrachten").update(row).eq("id",record.id).select().single();if(error)throw error;currentRecord=dbRowToRecord(data)}else{const{data,error}=await supabaseClient.from("overdrachten").insert(row).select().single();if(error)throw error;currentRecord=dbRowToRecord(data)}}
async function deleteRecordDb(id){const{error}=await supabaseClient.from("overdrachten").delete().eq("id",id);if(error)throw error}

function countTotal(r){return r.items.length}function countDone(r){return r.items.filter(i=>i.checked).length}function countFiveS(r){return r.fiveS.filter(i=>i.checked).length}function countPhotos(r){return(r.photos["2"]?.length||0)+(r.photos["6"]?.length||0)}
function hideAll(){dashboardView.classList.add("hidden");checklistView.classList.add("hidden");fiveSView.classList.add("hidden")}
function parseDateNL(str){if(!str)return null;const m=String(str).match(/(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);if(m)return new Date(Number(m[3]),Number(m[2])-1,Number(m[1]));const d=new Date(str);return isNaN(d)?null:d}
function isoDateFromRecord(r){const d=parseDateNL(r.dateTime)||parseDateNL(r.createdAt);if(!d)return"";return d.toISOString().slice(0,10)}
function getWeekNumber(d){d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dayNum=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-dayNum);const yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-yearStart)/86400000)+1)/7)}
function weekFromRecord(r){const d=parseDateNL(r.dateTime)||parseDateNL(r.createdAt);return d?getWeekNumber(d):""}

async function showDashboard(){
 hideAll();dashboardView.classList.remove("hidden");
 dashboardView.innerHTML=`<div class="card"><h2>Dashboard laden...</h2><p>Gegevens worden opgehaald uit Supabase.</p></div>`;
 try{await loadRecords();renderDashboard(cachedRecords)}catch(error){dashboardView.innerHTML=`<div class="error"><strong>Kan gegevens niet laden.</strong><br>${escapeHtml(error.message)}</div>`}
}
function renderDashboard(records){
 const today=new Date().toISOString().slice(0,10);
 const html=`<div class="notice no-print"><strong>Dashboard:</strong> zoek op datum, weeknummer of teamleider. Foto's kun je openen door op een miniatuur te klikken.</div>
 <div class="grid"><div class="stat"><small>Overdrachten</small><strong>${records.length}</strong></div><div class="stat"><small>Deze week</small><strong>${records.filter(r=>weekFromRecord(r)===getWeekNumber(new Date())).length}</strong></div><div class="stat"><small>Foto's totaal</small><strong>${records.reduce((a,r)=>a+countPhotos(r),0)}</strong></div><div class="stat"><small>Vandaag</small><strong>${records.filter(r=>isoDateFromRecord(r)===today).length}</strong></div></div>
 <div class="card no-print"><h2>Zoeken / filteren</h2><div class="filtergrid">
 <div><label>Vanaf datum</label><input type="date" id="filterFrom" onchange="applyFilters()"></div>
 <div><label>Tot datum</label><input type="date" id="filterTo" onchange="applyFilters()"></div>
 <div><label>Weeknummer</label><input type="number" id="filterWeek" min="1" max="53" placeholder="Bijv. 12" oninput="applyFilters()"></div>
 <div><label>Zoeken</label><input type="text" id="filterText" placeholder="Teamleider / tekst" oninput="applyFilters()"></div>
 <div><button class="secondary" onclick="clearFilters()">Wis filters</button></div>
 </div></div>
 <div class="card"><h2>Opgeslagen overdrachten</h2><div id="dashboardTable"></div></div>`;
 dashboardView.innerHTML=html;
 renderDashboardTable(records);
}
function applyFilters(){
 let rows=[...cachedRecords];
 const from=document.getElementById("filterFrom")?.value;
 const to=document.getElementById("filterTo")?.value;
 const week=document.getElementById("filterWeek")?.value;
 const text=(document.getElementById("filterText")?.value||"").toLowerCase();
 if(from)rows=rows.filter(r=>isoDateFromRecord(r)>=from);
 if(to)rows=rows.filter(r=>isoDateFromRecord(r)<=to);
 if(week)rows=rows.filter(r=>String(weekFromRecord(r))===String(week));
 if(text)rows=rows.filter(r=>JSON.stringify(r).toLowerCase().includes(text));
 renderDashboardTable(rows);
}
function clearFilters(){["filterFrom","filterTo","filterWeek","filterText"].forEach(id=>{const el=document.getElementById(id);if(el)el.value=""});renderDashboardTable(cachedRecords)}
function renderDashboardTable(records){
 const target=document.getElementById("dashboardTable");
 if(!records.length){target.innerHTML="<p>Geen overdrachten gevonden.</p>";return}
 target.innerHTML=`<div class="table-wrap"><table class="table"><thead><tr><th>Datum</th><th>Week</th><th>Overdragend</th><th>Ontvangend</th><th>Checklist</th><th>5S</th><th>Foto's</th><th>Acties</th></tr></thead><tbody>${records.map(r=>`<tr><td>${r.dateTime||r.createdAt}</td><td><span class="badge">Wk ${weekFromRecord(r)||"-"}</span></td><td>${r.handoverLeader||"-"}</td><td>${r.receivingLeader||"-"}</td><td>${countDone(r)} / ${countTotal(r)}</td><td>${countFiveS(r)} / ${r.fiveS.length}</td><td><div class="thumbrow">${photoThumbs(r)}</div></td><td><button onclick="openRecord('${r.id}')">Openen</button> <button class="danger" onclick="deleteRecord('${r.id}')">Verwijderen</button></td></tr>`).join("")}</tbody></table></div>`;
}
function photoThumbs(r){const photos=[...(r.photos["2"]||[]),...(r.photos["6"]||[])];if(!photos.length)return "-";return photos.slice(0,4).map(src=>`<img class="thumb" src="${src}" onclick="openPhoto('${src}')">`).join("")+(photos.length>4?`<span class="badge">+${photos.length-4}</span>`:"")}
function openPhoto(src){modalImg.src=src;photoModal.style.display="flex"}
function closePhoto(){photoModal.style.display="none";modalImg.src=""}

function newChecklist(){currentRecord=emptyRecord();renderChecklist()}
function openRecord(id){currentRecord=ensureRecordShape(cachedRecords.find(r=>r.id===id));renderChecklist()}
async function deleteRecord(id){if(!confirm("Weet je zeker dat je deze checklist wilt verwijderen?"))return;try{await deleteRecordDb(id);await showDashboard()}catch(e){alert("Verwijderen mislukt: "+e.message)}}

function renderChecklist(){if(!currentRecord)currentRecord=emptyRecord();hideAll();checklistView.classList.remove("hidden");const done=countDone(currentRecord),total=countTotal(currentRecord),percent=Math.round(done/total*100);let html=`<div class="card no-print"><h2>Checklist voortgang</h2><p>${done} van ${total} punten afgevinkt (${percent}%).</p><div class="progressbar"><div style="width:${percent}%"></div></div><p><button onclick="showFiveS()">Naar 5S Checklist</button></p></div>`;checklistTemplate.forEach((section,sIndex)=>{html+=`<div class="section"><h2>${sIndex+1}. ${section.title}</h2>`;section.items.forEach((label,iIndex)=>{const item=currentRecord.items.find(x=>x.section===sIndex&&x.index===iIndex);html+=`<div class="item"><div class="row"><input type="checkbox" ${item.checked?"checked":""} onchange="updateChecked(${sIndex},${iIndex},this.checked)"><label>${label}</label></div><textarea placeholder="Opmerking toevoegen..." oninput="updateComment(${sIndex},${iIndex},this.value)">${escapeHtml(item.comment)}</textarea></div>`});if(sIndex===1||sIndex===5)html+=renderPhotoBox(sIndex+1);html+=`</div>`});html+=renderFooter();checklistView.innerHTML=html}
function renderPhotoBox(sectionNumber){const photos=currentRecord.photos[String(sectionNumber)]||[];return `<div class="photo-box"><h3>Foto's bij punt ${sectionNumber}</h3><input class="no-print" type="file" accept="image/*" capture="environment" multiple onchange="addPhotos(${sectionNumber}, this.files)"><div class="photo-grid">${photos.map((src,idx)=>`<div class="photo"><img src="${src}" onclick="openPhoto('${src}')"><button class="no-print" onclick="removePhoto(${sectionNumber},${idx})">x</button></div>`).join("")}</div></div>`}
function renderFooter(){return `<div class="footer"><h2>Ondertekening</h2><div class="meta"><div><label>Overdragende teamleider</label><input type="text" value="${escapeHtml(currentRecord.handoverLeader)}" oninput="currentRecord.handoverLeader=this.value"></div><div><label>Ontvangende teamleider</label><input type="text" value="${escapeHtml(currentRecord.receivingLeader)}" oninput="currentRecord.receivingLeader=this.value"></div><div><label>Datum / Tijd</label><input type="text" value="${escapeHtml(currentRecord.dateTime)}" oninput="currentRecord.dateTime=this.value"></div></div><div style="margin-top:20px;" class="no-print"><button class="green" onclick="saveChecklist()">Online opslaan</button> <button onclick="showFiveS()">5S Checklist</button> <button class="orange" onclick="savePdf()">Opslaan als PDF</button> <button class="secondary" onclick="showDashboard()">Terug naar dashboard</button></div><div id="saved" class="success">Checklist online opgeslagen.</div></div>`}
function showFiveS(){if(!currentRecord)currentRecord=emptyRecord();hideAll();fiveSView.classList.remove("hidden");const done=countFiveS(currentRecord),total=currentRecord.fiveS.length;fiveSView.innerHTML=`<div class="card"><h2>5S Checklist</h2><p>${done} van ${total} punten afgevinkt.</p><div class="progressbar"><div style="width:${Math.round(done/total*100)}%"></div></div></div><div class="section"><h2>5S Controle</h2><div class="five-grid">${currentRecord.fiveS.map((item,idx)=>`<div class="five-item"><div class="row"><input type="checkbox" ${item.checked?"checked":""} onchange="updateFiveS(${idx},this.checked)"><label>${item.label}</label></div></div>`).join("")}</div></div><div class="footer no-print"><button class="green" onclick="saveChecklist()">Online opslaan</button> <button onclick="renderChecklist()">Terug naar checklist</button> <button class="orange" onclick="savePdf()">Opslaan als PDF</button></div>`}
function renderPrintAll(){renderChecklist();const ch=checklistView.innerHTML;showFiveS();const fs=fiveSView.innerHTML;dashboardView.classList.add("hidden");checklistView.classList.remove("hidden");fiveSView.classList.remove("hidden");checklistView.innerHTML=ch;fiveSView.innerHTML=fs}
function updateChecked(section,index,value){currentRecord.items.find(x=>x.section===section&&x.index===index).checked=value}
function updateComment(section,index,value){currentRecord.items.find(x=>x.section===section&&x.index===index).comment=value}
function updateFiveS(index,value){currentRecord.fiveS[index].checked=value;showFiveS()}
function addPhotos(sectionNumber,files){const key=String(sectionNumber);if(!currentRecord.photos[key])currentRecord.photos[key]=[];Array.from(files).forEach(file=>{const reader=new FileReader();reader.onload=e=>{currentRecord.photos[key].push(e.target.result);renderChecklist()};reader.readAsDataURL(file)})}
function removePhoto(sectionNumber,index){currentRecord.photos[String(sectionNumber)].splice(index,1);renderChecklist()}
async function saveChecklist(){if(!currentRecord){alert("Start eerst een nieuwe checklist.");return}try{await saveRecord(currentRecord);alert("Checklist online opgeslagen.");await showDashboard()}catch(e){alert("Opslaan mislukt: "+e.message)}}
async function saveRecord(record){const row=recordToDbRow(record);if(record.id){const{data,error}=await supabaseClient.from("overdrachten").update(row).eq("id",record.id).select().single();if(error)throw error;currentRecord=dbRowToRecord(data)}else{const{data,error}=await supabaseClient.from("overdrachten").insert(row).select().single();if(error)throw error;currentRecord=dbRowToRecord(data)}}
async function savePdf(){if(!currentRecord){alert("Start of open eerst een checklist.");return}try{await saveRecord(currentRecord)}catch(e){alert("Online opslaan mislukt, PDF wordt wel geopend: "+e.message)}renderPrintAll();setTimeout(()=>window.print(),250)}
function escapeHtml(str){return String(str||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js"))}
showDashboard();
</script>
</body>
</html>
