button,.btnlabel{border:0;border-radius:10px;background:var(--blue2);color:white;padding:11px 14px;font-size:14px;cursor:pointer;display:inline-block} button.secondary,.btnlabel.secondary{background:#e2e8f0;color:#0f172a} button.green{background:var(--green)} button.orange{background:var(--orange)} button.danger{background:var(--red)}
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:var(--blue);padding:9px;display:flex;gap:7px;justify-content:center;z-index:20;flex-wrap:wrap} .bottomnav button{min-width:100px}

.table-wrap{overflow:auto} table{width:100%;border-collapse:collapse;background:white;min-width:900px} th,td{text-align:left;border-bottom:1px solid var(--line);padding:11px;vertical-align:top}
input,textarea,select{margin-top:7px;padding:10px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;width:100%;background:white} input[readonly]{background:#f1f5f9;color:#475569;cursor:not-allowed}
.meta{display:grid;grid-template-columns:repeat(3,1fr);gap:14px} .filtergrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:end} .row{display:flex;gap:10px;align-items:center} input[type=checkbox]{width:20px;height:20px}

const $=id=>document.getElementById(id);
function esc(s){return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function hideAll(){["dashboardView","handoverView","fiveSView","inboundView","expeditieView","adminView","myReportsView"].forEach(id=>$(id).classList.add("hidden"))}
function parseDateNL(str){const m=String(str||"").match(/(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);if(m)return new Date(+m[3],+m[2]-1,+m[1]);const d=new Date(str);return isNaN(d)?null:d}
function isoDate(r){const d=parseDateNL(r.dateTime);return d?d.toISOString().slice(0,10):""}
function weekNo(d){d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const n=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-n);const y=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-y)/86400000)+1)/7)}
function weekRec(r){const d=parseDateNL(r.dateTime);return d?weekNo(d):""}
function countPhotosObj(p){return Object.values(p||{}).reduce((a,b)=>a+(b?.length||0),0)}
function openPhoto(src){modalImg.src=src;photoModal.style.display="flex"} function closePhoto(){photoModal.style.display="none";modalImg.src=""}

async function loadData(){
 const h=await supabaseClient
   .from("overdrachten")
   .select("id,created_at,datum_tijd,overdragende_teamleider,ontvangende_teamleider,created_by")
   .order("created_at",{ascending:false})
   .limit(150);
 if(h.error)throw h.error;
 handovers=(h.data||[]).map(r=>({
   id:r.id,
   dateTime:r.datum_tijd||"",
   handoverLeader:r.overdragende_teamleider||"",
   receivingLeader:r.ontvangende_teamleider||"",
   items:[],
   fiveS:[],
   photos:{},
   createdBy:r.created_by||""
 }));

 const i=await supabaseClient
   .from("ingangscontroles")
   .select("id,created_at,datum_tijd,ordernummer,controleur,created_by")
   .order("created_at",{ascending:false})
   .limit(150);
 if(i.error)throw i.error;
 inbounds=(i.data||[]).map(r=>({
   id:r.id,
   dateTime:r.datum_tijd||"",
   orderNumber:r.ordernummer||"",
   controller:r.controleur||"",
   items:[],
   photos:{},
   createdBy:r.created_by||""
 }));

 const e=await supabaseClient
   .from("expeditiecontroles")
   .select("id,created_at,datum_tijd,vracht_type,zonder_schade,created_by")
   .order("created_at",{ascending:false})
   .limit(150);
 if(e.error)throw e.error;
 expedities=(e.data||[]).map(r=>({
   id:r.id,
   dateTime:r.datum_tijd||"",
   vrachtType:r.vracht_type||"",
   zonderSchade:r.zonder_schade||"",
   opmerking:"",
   photos:{},
   createdBy:r.created_by||""
 }));
}

async function showDashboard(){mode="dashboard";hideAll();dashboardView.classList.remove("hidden");dashboardView.innerHTML="<div class='card'><h2>Laden...</h2></div>";try{await loadData();renderDashboard("overdracht")}catch(e){dashboardView.innerHTML=`<div class="error"><b>Fout:</b> ${esc(e.message)}<br>Run supabase-setup.sql opnieuw.</div>`}}
function rowsFor(tab){return tab==="ingang"?inbounds:tab==="expeditie"?expedities:handovers}
function renderDashboard(tab){const rows=rowsFor(tab);dashboardView.innerHTML=`<div class="notice"><b>Versie:</b> complete v2 met Expeditiecontrole</div><div class="tabs"><button class="tab ${tab==='overdracht'?'active':''}" onclick="renderDashboard('overdracht')">Ploegenoverdrachten</button><button class="tab ${tab==='ingang'?'active':''}" onclick="renderDashboard('ingang')">Ingangscontroles</button><button class="tab ${tab==='expeditie'?'active':''}" onclick="renderDashboard('expeditie')">Expeditie</button></div><div class="grid"><div class="stat"><small>Aantal</small><strong>${rows.length}</strong></div><div class="stat"><small>Deze week</small><strong>${rows.filter(r=>weekRec(r)===weekNo(new Date())).length}</strong></div><div class="stat"><small>Modus</small><strong>Lite</strong></div><div class="stat"><small>Vandaag</small><strong>${rows.filter(r=>isoDate(r)===new Date().toISOString().slice(0,10)).length}</strong></div></div><div class="card"><h2>Zoeken/filteren</h2><div class="filtergrid"><div><label>Vanaf</label><input type="date" id="fFrom" oninput="filterDash('${tab}')"></div><div><label>Tot</label><input type="date" id="fTo" oninput="filterDash('${tab}')"></div><div><label>Week</label><input type="number" id="fWeek" oninput="filterDash('${tab}')"></div><div><label>Zoeken</label><input type="text" id="fText" oninput="filterDash('${tab}')"></div><button class="secondary" onclick="renderDashboard('${tab}')">Wis</button></div></div><div class="card"><h2>${tab==='ingang'?'Ingangscontroles':tab==='expeditie'?'Expeditiecontroles':'Ploegenoverdrachten'}</h2><div id="dashTable"></div></div>`;renderDashTable(tab,rows)}
function filterDash(tab){let rows=[...rowsFor(tab)],f=fFrom.value,t=fTo.value,w=fWeek.value,q=fText.value.toLowerCase();if(f)rows=rows.filter(r=>isoDate(r)>=f);if(t)rows=rows.filter(r=>isoDate(r)<=t);if(w)rows=rows.filter(r=>String(weekRec(r))===String(w));if(q)rows=rows.filter(r=>JSON.stringify(r).toLowerCase().includes(q));renderDashTable(tab,rows)}

 }else if(tab==="ingang"){

function photoBox(obj,key,add,remove){if(!obj[key])obj[key]=[];return `<div class="photo-box"><div style="display:flex;gap:10px;flex-wrap:wrap"><label class="btnlabel">Foto maken<input style="display:none" type="file" accept="image/*" capture="environment" multiple onchange="${add}"></label><label class="btnlabel secondary">Foto uit album<input style="display:none" type="file" accept="image/*" multiple onchange="${add}"></label></div><div class="photo-grid">${obj[key].map((p,i)=>`<div class="photo"><img src="${p}" onclick="openPhoto('${p}')"><button onclick="${remove}${i})">x</button></div>`).join("")}</div></div>`}

async function compressImageToMax100KB(file){
  const maxBytes = 100 * 1024;
  const image = new Image();

  const dataUrl = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

  await new Promise((resolve, reject) => {
    image.onload = resolve;
    image.onerror = reject;
    image.src = dataUrl;
  });

  let width = image.width;
  let height = image.height;
  let quality = 0.82;

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  async function render(){
    canvas.width = width;
    canvas.height = height;
    ctx.clearRect(0,0,width,height);
    ctx.drawImage(image,0,0,width,height);
    return canvas.toDataURL("image/jpeg", quality);
  }

  let output = await render();

  // Eerst kwaliteit omlaag
  while(output.length * 0.75 > maxBytes && quality > 0.35){
    quality -= 0.08;
    output = await render();
  }

  // Daarna afmetingen omlaag indien nodig
  while(output.length * 0.75 > maxBytes && width > 640){
    width = Math.round(width * 0.85);
    height = Math.round(height * 0.85);
    quality = Math.max(0.35, quality);
    output = await render();
  }

  return output;
}

async function addPhotosTo(obj,key,files,cb){
  if(!obj[key]) obj[key]=[];

  const fileList = Array.from(files);
  for(const file of fileList){
    try{
      const compressed = await compressImageToMax100KB(file);
      obj[key].push(compressed);
    }catch(e){
      alert("Foto comprimeren mislukt: " + e.message);
    }
  }

  cb();
}

function renderHandover(){hideAll();handoverView.classList.remove("hidden");let done=currentHandover.items.filter(i=>i.checked).length,total=currentHandover.items.length;let html=`<div class="card"><h2>Ploegenoverdracht</h2><p>${done}/${total}</p><div class="progressbar"><div style="width:${Math.round(done/total*100)}%"></div></div></div>`;checklistTemplate.forEach((s,si)=>{html+=`<div class="section"><h2>${si+1}. ${s.title}</h2>`;s.items.forEach((label,ii)=>{let it=currentHandover.items.find(x=>x.section===si&&x.index===ii)||{checked:false,comment:""};html+=`<div class="item"><div class="row"><input type="checkbox" ${it.checked?"checked":""} onchange="currentHandover.items.find(x=>x.section===${si}&&x.index===${ii}).checked=this.checked"><b>${esc(label)}</b></div><textarea placeholder="Opmerking" oninput="currentHandover.items.find(x=>x.section===${si}&&x.index===${ii}).comment=this.value">${esc(it.comment)}</textarea></div>`});if(si===1||si===5)html+=photoBox(currentHandover.photos,String(si+1),`addHandoverPhotos(${si+1},this.files)`,`removeHandoverPhoto(${si+1},`);html+=`</div>`});html+=`<div class="footer"><h2>Ondertekening</h2><div class="meta"><div><label>Overdragende teamleider</label><input value="${esc(currentHandover.handoverLeader)}" oninput="currentHandover.handoverLeader=this.value"></div><div><label>Ontvangende teamleider</label><input value="${esc(currentHandover.receivingLeader)}" oninput="currentHandover.receivingLeader=this.value"></div><div><label>Datum/tijd</label><input readonly value="${esc(currentHandover.dateTime)}"></div></div><br> <button onclick="showFiveS()">5S</button> </div>`;handoverView.innerHTML=html}

function hasRight(key){
  if(!currentUser) return false;
  if(currentUser.is_admin) return true;
  return !!currentUser[key];
}

function showLogin(){
  document.getElementById("appContainer").style.display="none";
  loginView.style.display="flex";
  loginView.innerHTML=`
  <div class="login-card">
    <img src="./icon.png" alt="Logo">
    <h2 style="text-align:center">Checklist CDE</h2>
    <p style="text-align:center;color:#64748b">Log in met gebruikersnaam en wachtwoord</p>
    <label>Gebruikersnaam</label>
    <input id="loginUsername" type="text" autocomplete="username" placeholder="bijv. robert">
    <label>Wachtwoord</label>
    <input id="loginPassword" type="password" autocomplete="current-password" placeholder="wachtwoord">
    <button style="width:100%;margin-top:16px" onclick="login()">Inloggen</button>
    <p style="font-size:12px;color:#64748b;margin-top:14px"><b>Versie: admin verwijderen rapporten v1</b></p>
  </div>`;
}

async function login(){
  const username=loginUsername.value.trim();
  const password=loginPassword.value;
  if(!username||!password) return alert("Vul gebruikersnaam en wachtwoord in.");
  const {data,error}=await supabaseClient.from("app_users").select("*").eq("username",username).eq("password",password).eq("is_active",true).maybeSingle();
  if(error) return alert("Login fout: "+error.message);
  if(!data) return alert("Gebruikersnaam of wachtwoord onjuist.");
  currentUser=data;
  localStorage.setItem("cde_current_user",JSON.stringify(currentUser));
  applyRights();
  showDashboard();
}

function logout(){
  localStorage.removeItem("cde_current_user");
  currentUser=null;
  showLogin();
}

function applyRights(){
  if(!currentUser) return showLogin();
  loginView.style.display="none";
  document.getElementById("appContainer").style.display="block";
  userBar.textContent=(currentUser.display_name||currentUser.username);
  const map = [
    ['button[onclick="showDashboard()"]','can_dashboard'],
    ['button[onclick="newHandover()"]','can_overdracht'],
    ['button[onclick="showFiveS()"]','can_5s'],
    ['button[onclick="newInbound()"]','can_ingang'],
    ['button[onclick="newExpeditie()"]','can_expeditie']
  ];
  map.forEach(([sel,right])=>{
    document.querySelectorAll(sel).forEach(el=>el.style.display=hasRight(right)?"inline-block":"none");
  });
  adminNavBtn.style.display=currentUser.is_admin?"inline-block":"none";
}

function deny(){
  alert("Geen rechten voor deze module.");
}

const originalShowDashboard = showDashboard;
showDashboard = async function(){
  if(!hasRight("can_dashboard")){
    if(hasRight("can_overdracht")) return newHandover();
    if(hasRight("can_ingang")) return newInbound();
    if(hasRight("can_expeditie")) return newExpeditie();
    return deny();
  }
  return originalShowDashboard();
};

const originalNewHandover = newHandover;
newHandover = function(){ if(!hasRight("can_overdracht")) return deny(); originalNewHandover(); };

const originalShowFiveS = showFiveS;
showFiveS = function(){ if(!hasRight("can_5s")) return deny(); originalShowFiveS(); };

const originalNewInbound = newInbound;
newInbound = function(){ if(!hasRight("can_ingang")) return deny(); originalNewInbound(); };

const originalNewExpeditie = newExpeditie;
newExpeditie = function(){ if(!hasRight("can_expeditie")) return deny(); originalNewExpeditie(); };

function clearUserForm(){
  editUserId.value="";
  newUserName.value="";
  newUserName.disabled=false;
  newUserPass.value="1234";
  newDisplayName.value="";
  rDashboard.checked=false;
  rOverdracht.checked=false;
  r5s.checked=false;
  rIngang.checked=false;
  rExpeditie.checked=false;
  rAdmin.checked=false;
}

function editUserFromAdmin(id){
  const u=(window.__adminUsers||[]).find(x=>x.id===id);
  if(!u) return alert("Gebruiker niet gevonden.");

  editUserId.value=u.id;
  newUserName.value=u.username || "";
  newUserName.disabled=true;
  newUserPass.value=u.password || "";
  newDisplayName.value=u.display_name || "";

  rDashboard.checked=!!u.can_dashboard;
  rOverdracht.checked=!!u.can_overdracht;
  r5s.checked=!!u.can_5s;
  rIngang.checked=!!u.can_ingang;
  rExpeditie.checked=!!u.can_expeditie;
  rAdmin.checked=!!u.is_admin;

  window.scrollTo({top:0,behavior:"smooth"});
}

async function saveUserFromAdmin(){
  const id=editUserId.value;
  const username=newUserName.value.trim();
  const password=newUserPass.value.trim();

  if(!username || !password){
    return alert("Gebruikersnaam en wachtwoord zijn verplicht.");
  }

  const row={
    username,
    password,
    display_name:newDisplayName.value.trim() || username,
    can_dashboard:rDashboard.checked,
    can_overdracht:rOverdracht.checked,
    can_5s:r5s.checked,
    can_ingang:rIngang.checked,
    can_expeditie:rExpeditie.checked,
    is_admin:rAdmin.checked,
    is_active:true
  };

  let result;
  if(id){
    result=await supabaseClient.from("app_users").update(row).eq("id",id);
  } else {
    result=await supabaseClient.from("app_users").upsert(row,{onConflict:"username"});
  }

  if(result.error){
    return alert("Opslaan mislukt: " + result.error.message);
  }

  alert("Gebruiker opgeslagen.");
  showAdmin();
}

async function deleteUserFromAdmin(id, username){
  if(username === currentUser.username){
    return alert("Je kunt jezelf niet verwijderen terwijl je bent ingelogd.");
  }

  if(!confirm("Weet je zeker dat je gebruiker '" + username + "' wilt verwijderen?")){
    return;
  }

  const {error}=await supabaseClient.from("app_users").delete().eq("id",id);
  if(error){
    return alert("Verwijderen mislukt: " + error.message);
  }

  alert("Gebruiker verwijderd.");
  showAdmin();
}

  return saveUserFromAdmin();
}

    <div class="tabs">
      <button class="tab active" onclick="renderMyReportsTab('overdracht')">Overdrachten (${myHandovers.length})</button>
      <button class="tab" onclick="renderMyReportsTab('ingang')">Ingang (${myInbounds.length})</button>
      <button class="tab" onclick="renderMyReportsTab('expeditie')">Expeditie (${myExpedities.length})</button>
    </div>

    <div class="card">
      <div id="myReportsTable"></div>
    </div>`;

    renderMyReportsTab('overdracht');

  }catch(e){
    myReportsView.innerHTML=`<div class="error"><b>Fout bij laden Mijn rapporten:</b><br>${esc(e.message)}<br><br>Voer supabase-setup.sql opnieuw uit zodat de indexen en created_by kolommen bestaan.</div>`;
  }
}

function renderMyReportsTab(tab){
  const rows=(window.__myReports||{})[tab]||[];
  const labels={overdracht:"Overdrachten",ingang:"Ingangscontrole",expeditie:"Expeditiecontrole"};

  if(!rows.length){
    myReportsTable.innerHTML=`<h2>${labels[tab]}</h2><p>Geen eigen rapporten gevonden.</p>`;
    return;
  }

  if(tab==="overdracht"){
    myReportsTable.innerHTML=`<h2>Mijn overdrachten</h2><div class="table-wrap"><table><thead><tr><th>Datum</th><th>Overdragend</th><th>Ontvangend</th><th>Acties</th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td>${esc(r.dateTime)}</td><td>${esc(r.handoverLeader||"-")}</td><td>${esc(r.receivingLeader||"-")}</td><td><button onclick="openHandoverFromDb('${r.id}')">Open</button> <button class="orange" onclick="pdfHandoverFromDb('${r.id}')">PDF</button>${adminDeleteButton("overdracht",r.id)}</td></tr>`).join("")}
    </tbody></table></div>`;
  }

  if(tab==="ingang"){
    myReportsTable.innerHTML=`<h2>Mijn ingangscontroles</h2><div class="table-wrap"><table><thead><tr><th>Datum</th><th>Order</th><th>Controleur</th><th>Acties</th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td>${esc(r.dateTime)}</td><td>${esc(r.orderNumber||"-")}</td><td>${esc(r.controller||"-")}</td><td><button onclick="openInboundFromDb('${r.id}')">Open</button> <button class="orange" onclick="pdfInboundFromDb('${r.id}')">PDF</button>${adminDeleteButton("ingang",r.id)}</td></tr>`).join("")}
    </tbody></table></div>`;
  }

  if(tab==="expeditie"){
    myReportsTable.innerHTML=`<h2>Mijn expeditiecontroles</h2><div class="table-wrap"><table><thead><tr><th>Datum</th><th>Vracht</th><th>Zonder schade</th><th>Acties</th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td>${esc(r.dateTime)}</td><td>${esc(r.vrachtType||"-")}</td><td>${esc(r.zonderSchade||"-")}</td><td><button onclick="openExpeditieFromDb('${r.id}')">Open</button> <button class="orange" onclick="pdfExpeditieFromDb('${r.id}')">PDF</button>${adminDeleteButton("expeditie",r.id)}</td></tr>`).join("")}
    </tbody></table></div>`;
  }
}

async function openHandoverFromDb(id){
  const {data,error}=await supabaseClient.from("overdrachten").select("*").eq("id",id).single();
  if(error) return alert("Openen mislukt: "+error.message);
  currentHandover={
    id:data.id,
    dateTime:data.datum_tijd||"",
    handoverLeader:data.overdragende_teamleider||"",
    receivingLeader:data.ontvangende_teamleider||"",
    items:data.checklist_data||[],
    fiveS:data.five_s_data||[],
    photos:data.photos||{"2":[],"6":[]},
    createdBy:data.created_by||""
  };
  mode="handover";
  renderHandover();
}

async function openInboundFromDb(id){
  const {data,error}=await supabaseClient.from("ingangscontroles").select("*").eq("id",id).single();
  if(error) return alert("Openen mislukt: "+error.message);
  currentInbound={
    id:data.id,
    dateTime:data.datum_tijd||"",
    orderNumber:data.ordernummer||"",
    controller:data.controleur||"",
    items:data.checklist_data||[],
    photos:data.photos||{quality:[],wholeorder:[]},
    createdBy:data.created_by||""
  };
  mode="inbound";
  renderInbound();
}

async function openExpeditieFromDb(id){
  const {data,error}=await supabaseClient.from("expeditiecontroles").select("*").eq("id",id).single();
  if(error) return alert("Openen mislukt: "+error.message);
  currentExpeditie={
    id:data.id,
    dateTime:data.datum_tijd||"",
    vrachtType:data.vracht_type||"",
    zonderSchade:data.zonder_schade||"",
    opmerking:data.opmerking||"",
    photos:data.photos||{trailer:[]},
    createdBy:data.created_by||""
  };
  mode="expeditie";
  renderExpeditie();
}

async function pdfHandoverFromDb(id){
  await openHandoverFromDb(id);
  pdfHandover();
}

async function pdfInboundFromDb(id){
  await openInboundFromDb(id);
  pdfInbound();
}

async function pdfExpeditieFromDb(id){
  await openExpeditieFromDb(id);
  pdfExpeditie();
}


// Dashboard opent voortaan altijd volledige data pas bij openen/PDF
function openHandover(id){ return openHandoverFromDb(id); }
function openInbound(id){ return openInboundFromDb(id); }
function openExpeditie(id){ return openExpeditieFromDb(id); }
function pdfHandoverById(id){ return pdfHandoverFromDb(id); }
function pdfInboundById(id){ return pdfInboundFromDb(id); }
function pdfExpeditieById(id){ return pdfExpeditieFromDb(id); }


async function deleteHandoverReport(id){
  if(!currentUser?.is_admin) return deny();
  if(!confirm("Weet je zeker dat je deze ploegenoverdracht wilt verwijderen?")) return;
  const {error}=await supabaseClient.from("overdrachten").delete().eq("id",id);
  if(error) return alert("Verwijderen mislukt: "+error.message);
  alert("Rapport verwijderd.");
  showDashboard();
}

async function deleteInboundReport(id){
  if(!currentUser?.is_admin) return deny();
  if(!confirm("Weet je zeker dat je deze ingangscontrole wilt verwijderen?")) return;
  const {error}=await supabaseClient.from("ingangscontroles").delete().eq("id",id);
  if(error) return alert("Verwijderen mislukt: "+error.message);
  alert("Rapport verwijderd.");
  showDashboard();
}

async function deleteExpeditieReport(id){
  if(!currentUser?.is_admin) return deny();
  if(!confirm("Weet je zeker dat je deze expeditiecontrole wilt verwijderen?")) return;
  const {error}=await supabaseClient.from("expeditiecontroles").delete().eq("id",id);
  if(error) return alert("Verwijderen mislukt: "+error.message);
  alert("Rapport verwijderd.");

function adminDeleteButton(type,id){
  if(!currentUser?.is_admin) return "";
  if(type==="overdracht") return ` <button class="danger" onclick="deleteHandoverReport('${id}')">Verwijderen</button>`;
  if(type==="ingang") return ` <button class="danger" onclick="deleteInboundReport('${id}')">Verwijderen</button>`;
  if(type==="expeditie") return ` <button class="danger" onclick="deleteExpeditieReport('${id}')">Verwijderen</button>`;
  return "";
}


function boot(){
  const saved=localStorage.getItem("cde_current_user");
  if(saved){
    currentUser=JSON.parse(saved);
    applyRights();
    showDashboard();
  } else {
    showLogin();
  }
}

boot();
</script>
